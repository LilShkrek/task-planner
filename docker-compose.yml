services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_planner}
      POSTGRES_USER: ${POSTGRES_USER:-task_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task_planner}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-task_planner} -d ${POSTGRES_DB:-task_planner}"]
      interval: 5s
      timeout: 3s
      retries: 10

  ml-service:
    build:
      context: ./ml-service
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://task_planner:task_planner@db:5432/task_planner?sslmode=disable}
      ML_DATABASE_URL: ${ML_DATABASE_URL:-postgres://task_planner:task_planner@db:5432/task_planner?sslmode=disable}
      MODEL_PATH: ${MODEL_PATH:-/app/artifacts/time_management_model.pt}
      GENERATIVE_MODEL_NAME: ${GENERATIVE_MODEL_NAME:-cointegrated/rut5-base-multitask}
      GENERATIVE_MODEL_CACHE: ${GENERATIVE_MODEL_CACHE:-/app/model-cache}
      GENERATIVE_MAX_INPUT_TOKENS: ${GENERATIVE_MAX_INPUT_TOKENS:-384}
      GENERATIVE_MAX_NEW_TOKENS: ${GENERATIVE_MAX_NEW_TOKENS:-64}
      GENERATIVE_NUM_BEAMS: ${GENERATIVE_NUM_BEAMS:-1}
      ML_SERVICE_ADDR: ${ML_SERVICE_ADDR:-0.0.0.0}
      ML_SERVICE_PORT: ${ML_SERVICE_PORT:-8090}
    ports:
      - "8090:8090"
    volumes:
      - ./ml-service/artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SERVER_ADDR: ${SERVER_ADDR:-:8080}
      SERVER_READ_TIMEOUT_SECONDS: ${SERVER_READ_TIMEOUT_SECONDS:-10}
      SERVER_WRITE_TIMEOUT_SECONDS: ${SERVER_WRITE_TIMEOUT_SECONDS:-120}
      DATABASE_URL: ${DATABASE_URL:-postgres://task_planner:task_planner@db:5432/task_planner?sslmode=disable}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8090}
      ML_SERVICE_TIMEOUT_SECONDS: ${ML_SERVICE_TIMEOUT_SECONDS:-90}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy

volumes:
  postgres_data:
