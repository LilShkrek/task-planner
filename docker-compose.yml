services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_planner}
      POSTGRES_USER: ${POSTGRES_USER:-task_planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-task_planner}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-task_planner} -d ${POSTGRES_DB:-task_planner}"]
      interval: 5s
      timeout: 3s
      retries: 10

  ml-service:
    build:
      context: ./ml-service
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://task_planner:task_planner@db:5432/task_planner?sslmode=disable}
      ML_DATABASE_URL: ${ML_DATABASE_URL:-postgres://task_planner:task_planner@db:5432/task_planner?sslmode=disable}
      ML_SERVICE_ADDR: ${ML_SERVICE_ADDR:-0.0.0.0}
      ML_SERVICE_PORT: ${ML_SERVICE_PORT:-8090}
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SERVER_ADDR: ${SERVER_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://task_planner:task_planner@db:5432/task_planner?sslmode=disable}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8090}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_healthy

volumes:
  postgres_data:
